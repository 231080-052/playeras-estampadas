<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos - Usuario</title>
    <link rel="stylesheet" href="productos usuarios.css">
</head>
<body>

    <header class="navbar-admin">
        <div class="logo">
            <img src="logo.png" alt="Logo">
        </div>

        <div class="search-box">
            <input type="text" placeholder="Buscar">
            <img src="lupa.png" class="search-icon-img" alt="Buscar">
        </div>

        <div class="admin-actions">
            <div class="profile-container">
                <img src="usuario.png" class="profile-pic" id="profilePic" alt="Usuario" style="cursor: pointer;">
            </div>
            
            <div class="cart-container">
                <a href="carrito.html" id="cart-link" style="text-decoration: none; position: relative; display: flex;">
                    <img src="carrito.png" class="action-icon" alt="Carrito">
                </a>
            </div>
        </div>
    </header>

    <nav class="admin-subnav">
        <button class="nav-btn active">Productos</button>
        <button class="nav-btn" onclick="window.location.href='ubiusuario.html'">Ubicaciones</button> 
        <button class="nav-btn" onclick="window.location.href='somosusuario.html'">¿Quienes somos?</button>
    </nav>

    <main class="content">
        <div class="product-grid">
            <div class="product-card" data-name="Alone" data-price="250" data-img="palone.png">
                <img src="palone.png" alt="Alone">
                <div class="card-info"><p>Alone</p><b>$250</b></div>
                <div class="quantity-container">
                    <div class="quantity-control">
                        <button class="btn-qty minus">-</button>
                        <span class="qty-number">0</span>
                        <button class="btn-qty plus">+</button>
                    </div>
                    <button class="btn-add-cart">Agregar al carrito</button>
                </div>
            </div>

            <div class="product-card" data-name="Ancla" data-price="250" data-img="pancla.png">
                <img src="pancla.png" alt="Ancla">
                <div class="card-info"><p>Ancla</p><b>$250</b></div>
                <div class="quantity-container">
                    <div class="quantity-control">
                        <button class="btn-qty minus">-</button>
                        <span class="qty-number">0</span>
                        <button class="btn-qty plus">+</button>
                    </div>
                    <button class="btn-add-cart">Agregar al carrito</button>
                </div>
            </div>

            <div class="product-card" data-name="Chile" data-price="250" data-img="pchile.png">
                <img src="pchile.png" alt="Chile">
                <div class="card-info"><p>Chile</p><b>$250</b></div>
                <div class="quantity-container">
                    <div class="quantity-control">
                        <button class="btn-qty minus">-</button>
                        <span class="qty-number">0</span>
                        <button class="btn-qty plus">+</button>
                    </div>
                    <button class="btn-add-cart">Agregar al carrito</button>
                </div>
            </div>

            <div class="product-card" data-name="Lobo" data-price="250" data-img="plobo.png">
                <img src="plobo.png" alt="Lobo">
                <div class="card-info"><p>Lobo</p><b>$250</b></div>
                <div class="quantity-container">
                    <div class="quantity-control">
                        <button class="btn-qty minus">-</button>
                        <span class="qty-number">0</span>
                        <button class="btn-qty plus">+</button>
                    </div>
                    <button class="btn-add-cart">Agregar al carrito</button>
                </div>
            </div>

            <div class="product-card" data-name="Microfono" data-price="250" data-img="pmicrofono.png">
                <img src="pmicrofono.png" alt="Microfono">
                <div class="card-info"><p>Microfono</p><b>$250</b></div>
                <div class="quantity-container">
                    <div class="quantity-control">
                        <button class="btn-qty minus">-</button>
                        <span class="qty-number">0</span>
                        <button class="btn-qty plus">+</button>
                    </div>
                    <button class="btn-add-cart">Agregar al carrito</button>
                </div>
            </div>

            <div class="product-card" data-name="Playa" data-price="250" data-img="pplaya.png">
                <img src="pplaya.png" alt="Playa">
                <div class="card-info"><p>Playa</p><b>$250</b></div>
                <div class="quantity-container">
                    <div class="quantity-control">
                        <button class="btn-qty minus">-</button>
                        <span class="qty-number">0</span>
                        <button class="btn-qty plus">+</button>
                    </div>
                    <button class="btn-add-cart">Agregar al carrito</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="admin-pagination">
        <div class="pag-container">
            <a href="usuario1.html" class="page-btn-text">Anterior</a>
            <a href="usuario1.html" class="page-num">1</a>            
            <span class="page-num active">2</span>
            <a href="usuario3.html" class="page-num">3</a>
            <a href="usuario3.html" class="page-btn-text">Siguiente</a>
        </div>
    </footer>

    <div id="logoutModal" class="modal-overlay">
        <div class="modal-content">
            <p>¿Desea cerrar sesión?</p>
            <div class="modal-buttons">
                <button class="btn-modal accept" onclick="window.location.href='producto1.html'">Aceptar</button>
                <button class="btn-modal cancel" id="closeModal">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const profilePic = document.getElementById('profilePic');
        const modal = document.getElementById('logoutModal');
        const btnCancel = document.getElementById('closeModal');

        let cart = JSON.parse(localStorage.getItem('myCart')) || [];

        profilePic.onclick = () => modal.style.display = "flex";
        btnCancel.onclick = () => modal.style.display = "none";
        window.onclick = (e) => { if (e.target == modal) modal.style.display = "none"; };

        const cards = document.querySelectorAll('.product-card');
        cards.forEach(card => {
            const minus = card.querySelector('.minus');
            const plus = card.querySelector('.plus');
            const qty = card.querySelector('.qty-number');
            const addBtn = card.querySelector('.btn-add-cart');
            let count = 0;

            plus.onclick = () => { count++; qty.innerText = count; };
            minus.onclick = () => { if(count > 0) { count--; qty.innerText = count; } };
            
            addBtn.onclick = () => {
                if(count > 0) {
                    const productData = {
                        name: card.getAttribute('data-name'),
                        price: parseInt(card.getAttribute('data-price')),
                        img: card.getAttribute('data-img'),
                        quantity: count
                    };

                    const existingIndex = cart.findIndex(item => item.name === productData.name);
                    if(existingIndex > -1) {
                        cart[existingIndex].quantity += count;
                    } else {
                        cart.push(productData);
                    }

                    localStorage.setItem('myCart', JSON.stringify(cart));
                    
                    count = 0;
                    qty.innerText = 0;
                    alert("Producto agregado al carrito");
                }
            };
        });
    </script>
    </body>
</html>
