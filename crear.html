<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Camisetas Estampadas</title>
    <link rel="stylesheet" href="crear.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <img src="logo.png" alt="Logo">
        </div>
    </header>

    <main class="main-content">
        <form class="form-container" action="login.html">
            <div class="field">
                <label>Nombre(s)</label>
                <input type="text" placeholder="Ingresar Nombre" required>
            </div>

            <div class="field">
                <label>Apellido paterno</label>
                <input type="text" placeholder="Ingrese primer apellido" required>
            </div>

            <div class="field">
                <label>Apellido materno</label>
                <input type="text" placeholder="Ingrese segundo apellido" required>
            </div>

            <div class="field">
                <label>Correo</label>
                <input type="email" placeholder="ingrese correo" required>
            </div>

            <button type="submit" class="btn-submit">Crear</button>
        </form>

        <a href="login.html" class="back-link">
            <img src="flecha.png" alt="Volver" class="back-img">
        </a>
    </main>

</body>
</html>
