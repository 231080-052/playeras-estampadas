    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login - Camisetas Estampadas</title>
        <link rel="stylesheet" href="login.css">
    </head>
    <body class="login-page">

        <header class="navbar-login">
            <div class="logo-box">
                <img src="logo.png" alt="Logo">
            </div>
        </header>

        <main class="login-wrapper">
            <div class="login-card">
                <form>
                    <div class="input-field">
                        <label>Correo</label>
                        <input type="text" placeholder="Value">
                    </div>

                    <div class="input-field">
                        <label>Contraseña</label>
                        <input type="password" placeholder="Value">
                    </div>

                    <div class="actions"><button type="button" class="btn-beige" onclick="window.location.href='usuario1.html'">
                            Iniciar sesion
                        </button>
    
                        <button type="button" class="btn-beige" onclick="window.location.href='admin1.html'">
                            Iniciar sesion como administrador
                        </button>
                    </div>

                    <div class="extra-links">
                        <a href="crear.html">Crear cunta nueva</a>
                    </div>
                </form>
            </div>

        <div class="navigation-footer">
            <a href="index.html" class="back-btn">
                <img src="flecha.png" alt="Volver" class="back-arrow-img">
            </a>
        </div>
    </main>
</body>
</html>
