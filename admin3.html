<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos - Admin</title>
    <link rel="stylesheet" href="productos admin.css">
</head>
<body>

    <header class="navbar-admin">
        <div class="logo">
            <img src="logo.png" alt="Logo">
        </div>

        <div class="search-box">
            <input type="text" placeholder="Buscar">
            <img src="lupa.png" class="search-icon-img" alt="Buscar">
        </div>

        <div class="admin-actions">
            <a href="agregar producto.html">
                <img src="mas.png" class="action-icon" alt="Agregar" style="cursor: pointer;">
            </a>
            <div class="profile-container">
                <img src="admin.png" class="profile-pic" id="profilePic" alt="Admin" style="cursor: pointer;">
    </header>

    <nav class="main-nav">
        <button class="nav-btn active">Productos</button>
        <button class="nav-btn" onclick="window.location.href='ubiadmin.html'">ubicaciones</button>
        <button class="nav-btn" onclick="window.location.href='somosadmin.html'">¿Quienes somos?</button>
    </nav>
    <main class="content">
        <div class="product-grid">
            <div class="product-card">
                <img src="pbatman.png" alt="Batman">
                <div class="card-info"><p>Batman</p><b>$250</b></div>
            </div>
            <div class="product-card">
                <img src="pbeerd.png" alt="Beerd">
                <div class="card-info"><p>Beerd</p><b>$250</b></div>
            </div>
            <div class="product-card">
                <img src="pcalifornia.png" alt="California">
                <div class="card-info"><p>California</p><b>$250</b></div>
            </div>
            <div class="product-card">
                <img src="pmickey.png" alt="Mickey">
                <div class="card-info"><p>Mickey</p><b>$250</b></div>
            </div>
            <div class="product-card">
                <img src="praton.png" alt="Speedy">
                <div class="card-info"><p>Speedy</p><b>$250</b></div>
            </div>
            <div class="product-card">
                <img src="pstich.png" alt="Stich">
                <div class="card-info"><p>Stich</p><b>$250</b></div>
            </div>
        </div>
    </main>

    <footer class="admin-pagination">
        <div class="pag-container">
            <a href="admin2.html" class="page-btn-text">Anterior</a>
            <a href="admin1.html" class="page-num">1</a>
            <a href="admin2.html" class="page-num">2</a>
            <span class="page-num active">3</span>
        </div>
    </footer>

    <div id="logoutModal" class="modal-overlay">
        <div class="modal-content">
            <p>¿Desea cerrar sesión?</p>
            <div class="modal-buttons">
                <button class="btn-modal accept" onclick="window.location.href='producto1.html'">Aceptar</button>
                <button class="btn-modal cancel" id="closeModal">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const profilePic = document.getElementById('profilePic');
        const modal = document.getElementById('logoutModal');
        const btnCancel = document.getElementById('closeModal');

        profilePic.onclick = function() {
            modal.style.display = "flex";
        }

        btnCancel.onclick = function() {
            modal.style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>
</body>
</html>
