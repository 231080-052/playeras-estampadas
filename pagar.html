<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos de Transferencia - Camisetas Estampadas</title>
    <link rel="stylesheet" href="pagar.css">
</head>
<body>

    <div class="full-screen-container">
        <header class="form-header">
            <div class="header-content">
                <h2>Datos de Pago</h2>
                <a href="carrito.html" class="close-btn">&times;</a>
            </div>
        </header>

        <main class="form-body">
            <form id="paymentForm">
                <div class="input-group">
                    <label>Numero de tarjeta</label>
                    <input type="text" placeholder="00000000000000">
                </div>

                <div class="input-group">
                    <label>Nombre del titular</label>
                    <input type="text" placeholder="Mombre completo">
                </div>

                <div class="input-group">
                    <label>Fecha de vencimiento</label>
                    <input type="text" placeholder="01/01/2027">
                </div>

                <div class="input-group">
                    <label>CVV</label>
                    <input type="text" placeholder="Codigo seguridad">
                </div>
                
                <div class="input-group">
                    <label>Total</label>
                    <input type="text" placeholder="$500" readonly>
                </div>

                <div class="button-container">
                    <button type="submit" class="btn-submit">Realizar pago</button>
                </div>
            </form>
        </main>
    </div>

    <script>
        document.getElementById('paymentForm').onsubmit = (e) => {
            e.preventDefault();
            alert('¡Pago realizado con éxito!');
            localStorage.removeItem('myCart');
            window.location.href = 'usuario1.html';
        };
    </script>
</body>
</html>
