<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiénes Somos - Admin</title>
    <link rel="stylesheet" href="somosadmin.css">
</head>
<body>

    <header class="navbar-admin">
        <div class="logo">
            <img src="logo.png" alt="Logo">
        </div>

        <div class="search-box">
            <input type="text" placeholder="Buscar">
            <img src="lupa.png" class="search-icon-img" alt="Buscar">
        </div>

        <div class="admin-actions">
            <img src="mas.png" class="action-icon" alt="Agregar">
            
            <div class="profile-container">
                <img src="admin.png" class="profile-pic" id="profilePic" alt="Admin" style="cursor: pointer;">
            </div>
        </div>
    </header>

    <nav class="admin-subnav">
        <button class="nav-btn" onclick="window.location.href='admin1.html'">Productos</button>
        <button class="nav-btn" onclick="window.location.href='ubiadmin.html'">ubicaciones</button>
        <button class="nav-btn active">¿Quienes somos?</button>
    </nav>

    <main class="main-content">
       <main style="text-align: center; padding: 20px;">
        <p style="margin-bottom: 20px; font-weight: bold;">
            Nosotros somos una tienda de venta de playeras unitalla,<br>
            estampadas con diseños únicos, marcas y colores.
        </p>
        </main>
        <div class="hero-image">
            <img src="platano.png" alt="Playera Diseño">
        </div>
    </main>

    <div id="logoutModal" class="modal-overlay">
        <div class="modal-content">
            <p>¿Desea cerrar sesión?</p>
            <div class="modal-buttons">
                <button class="btn-modal accept" onclick="window.location.href='producto1.html'">Aceptar</button>
                <button class="btn-modal cancel" id="closeModal">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const profilePic = document.getElementById('profilePic');
        const modal = document.getElementById('logoutModal');
        const btnCancel = document.getElementById('closeModal');

        profilePic.onclick = function() {
            modal.style.display = "flex";
        }

        btnCancel.onclick = function() {
            modal.style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>
</body>
</html>
