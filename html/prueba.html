<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Usuario - Página 3</title>
    <link rel="stylesheet" href="../css/prueba.css">
</head>
<body>

    <!-- Encabezado -->
    <header class="navbar-user">
        <div class="logo">
            <img src="../img/logo.png" alt="Logo">
        </div>

        <div class="search-box">
            <input type="text" placeholder="Buscar">
            <img src="../img/lupa.png" class="search-icon-img" alt="Buscar">
        </div>

        <div class="user-actions">
            <div class="profile-container">
                <!-- Foto de perfil: usuario.png con modal de cierre de sesión -->
                <img src="../img/usuario.png" class="profile-pic" id="profilePic" alt="Usuario" style="cursor: pointer;">
            </div>
            <img src="../img/carrito.png" class="action-icon" alt="Carrito">
        </div>
    </header>

    <!-- Navegación secundaria -->
    <nav class="user-subnav">
        <button class="nav-btn active">Productos</button>
        <button class="nav-btn" onclick="window.location.href='ubiusuario.html'">ubicaciones</button>
        <button class="nav-btn" onclick="window.location.href='somosusuario.html'">¿Quienes somos?</button>
    </nav>

    <!-- Grid de Productos con Contadores -->
    <main class="content">
        <div class="product-grid">
            <!-- Card de producto individual -->
            <div class="product-card">
                <div class="image-placeholder">
                    <img src="../img/playera1.png" alt="Playera">
                </div>
                <div class="card-info">
                    <p>Playera Diseño 1</p>
                    <b>$250</b>
                </div>
                <!-- Controles de cantidad -->
                <div class="quantity-container">
                    <div class="quantity-control">
                        <button class="btn-qty minus">-</button>
                        <span class="qty-number">0</span>
                        <button class="btn-qty plus">+</button>
                    </div>
                    <button class="btn-add-cart">Agregar al carrito</button>
                </div>
            </div>

            <!-- Puedes repetir este bloque .product-card para las demás playeras -->
            <!-- Ejemplo de segunda card -->
            <div class="product-card">
                <div class="image-placeholder"><img src="../img/playera2.png" alt="Playera"></div>
                <div class="card-info"><p>Playera Diseño 2</p><b>$250</b></div>
                <div class="quantity-container">
                    <div class="quantity-control">
                        <button class="btn-qty minus">-</button>
                        <span class="qty-number">0</span>
                        <button class="btn-qty plus">+</button>
                    </div>
                    <button class="btn-add-cart">Agregar al carrito</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Paginación -->
    <footer class="pagination-footer">
        <div class="pag-container">
            <a href="usuario2.html" class="pag-text">Anterior</a>
            <a href="usuario1.html" class="pag-num">1</a>
            <a href="usuario2.html" class="pag-num">2</a>
            <span class="pag-num active">3</span> <!-- Página actual en negro -->
            <span class="pag-text disabled">Siguiente</span>
        </div>
    </footer>

    <!-- Modal de Cerrar Sesión -->
    <div id="logoutModal" class="modal-overlay">
        <div class="modal-content">
            <p>¿Desea cerrar sesión?</p>
            <div class="modal-buttons">
                <button class="btn-modal accept" onclick="window.location.href='producto1.html'">Aceptar</button>
                <button class="btn-modal cancel" id="closeModal">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // Lógica del Modal
        const profilePic = document.getElementById('profilePic');
        const modal = document.getElementById('logoutModal');
        const btnCancel = document.getElementById('closeModal');

        profilePic.onclick = () => modal.style.display = "flex";
        btnCancel.onclick = () => modal.style.display = "none";
        window.onclick = (e) => { if (e.target == modal) modal.style.display = "none"; };

        // Lógica de los Contadores por producto
        const cards = document.querySelectorAll('.product-card');
        cards.forEach(card => {
            const minus = card.querySelector('.minus');
            const plus = card.querySelector('.plus');
            const qty = card.querySelector('.qty-number');
            const addBtn = card.querySelector('.btn-add-cart');
            let count = 0;

            plus.onclick = () => { count++; qty.innerText = count; };
            minus.onclick = () => { if(count > 0) { count--; qty.innerText = count; } };
            
            addBtn.onclick = () => {
                if(count > 0) alert(`Añadido: ${count} unidades al carrito.`);
                else alert("Selecciona al menos una unidad.");
            };
        });
    </script>
</body>
</html>
